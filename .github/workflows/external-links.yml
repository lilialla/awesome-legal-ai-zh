name: GitHub Repository Availability

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Query GitHub metadata
        run: python3 scripts/catalog.py refresh
      - name: Report inaccessible repositories
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          repositories = json.loads(
              Path("registry/github-metadata.json").read_text(encoding="utf-8")
          )["repositories"]
          inaccessible = sorted(
              project for project, metadata in repositories.items()
              if not metadata["accessible"]
          )
          if inaccessible:
              raise SystemExit("Inaccessible repositories: " + ", ".join(inaccessible))
          print(f"Verified {len(repositories)} GitHub repositories")
          PY
