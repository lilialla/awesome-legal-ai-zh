  <text class="t" x="240" y="98" font-size="46" font-weight="800" fill="#ffffff">法律人开源工具箱</text>
  <rect x="242" y="112" width="176" height="3.5" rx="1.75" fill="url(#gold)"/>
  <text class="t" x="242" y="150" font-size="23" font-weight="700" fill="url(#gold)" letter-spacing="1.5">awesome-legal-ai-zh</text>
  <text class="t" x="242" y="184" font-size="15.5" fill="#a9c0dd">187 个 gh 核验开源仓 · 按办案场景两级分类 · 每条标注「能否商用」</text>
