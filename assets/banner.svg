<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 236" width="1000" height="236" role="img" aria-label="awesome-legal-ai-zh · 法律人开源工具箱">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2240"/>
      <stop offset="0.55" stop-color="#163a64"/>
      <stop offset="1" stop-color="#1f4f8c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3cd6a"/>
      <stop offset="1" stop-color="#dca42a"/>
    </linearGradient>
    <style>
      .t{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif;}
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="234" rx="20" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="997" height="233" rx="19.5" fill="none" stroke="#3a6098" stroke-opacity="0.45"/>

  <!-- 天平图标 -->
  <g transform="translate(70,46)" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round" fill="none">
    <circle cx="70" cy="6" r="6.5" fill="url(#gold)" stroke="none"/>
    <line x1="70" y1="12" x2="70" y2="130"/>
    <line x1="14" y1="30" x2="126" y2="30"/>
    <line x1="20" y1="30" x2="20" y2="52"/>
    <line x1="120" y1="30" x2="120" y2="52"/>
    <path d="M2 52 Q20 88 38 52"/>
    <path d="M102 52 Q120 88 138 52"/>
    <line x1="44" y1="132" x2="96" y2="132"/>
  </g>
  <!-- AI 火花 -->
  <g transform="translate(150,40)" fill="url(#gold)">
